<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <title>Благодарим | reputacia.online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .thanks-page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 48px 16px;
        background: #f5f7fb;
      }
      .thanks-card {
        width: min(560px, 100%);
        background: #eef1f6;
        border-radius: 16px;
        padding: 28px 26px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
      }
      .thanks-card h1 {
        margin: 0 0 10px;
        font-size: 1.55rem;
        color: #0f172a;
      }
      .thanks-card p {
        margin: 0 0 16px;
        color: #334155;
      }
      .thanks-card a {
        color: #b91c1c;
        font-weight: 600;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      .thanks-card a:hover {
        color: #991b1b;
      }
    </style>
  </head>
  <body>
    <main class="thanks-page">
      <div class="thanks-card">
        <h1>Благодарим!</h1>
        <p>Формулярът беше изпратен успешно.</p>
        <p>
          <a href="https://reputacia.online/">Към началната страница на reputacia.online</a>
        </p>
      </div>
    </main>
  </body>
</html>
